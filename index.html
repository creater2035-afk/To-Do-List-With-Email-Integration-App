<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="mask-icon" href="safari-pinned-tab.svg" color="#5bbad5" />
  <meta name="msapplication-TileColor" content="#2d89ef" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="stylesheet" href="style.css" />
  <title>Todo-List with Email Integration</title>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script type="text/javascript">
    (function () {
      emailjs.init("d3gOlVdaUXfQ8nlDl"); // Placeholder for Public Key
    })();
  </script>
  <meta name="description"
    content="Manage your tasks effortlessly with our JavaScript Todos List App. Organize, prioritize, and track your to-dos seamlessly using this user-friendly web application." />
  <meta name="keywords"
   content="JavaScript Todos List App, Task Management, To-Do List Web App, Organize Tasks, Track To-Dos, Simple Task Manager, Productivity Tool, User-Friendly Interface, Web-based Task Organizer, JavaScript Task Tracker" />
   <!-- Font Awesome for mic icon -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>
  <div class="wrapper">
    <div class="screen-backdrop"></div>
    <div class="home-screen screen">
      <div class="head-wrapper">
        <div class="menu-btn" color="rgb(255,255,0)">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25H12" />
          </svg>
        </div>
        <div class="user-profile">
          <div class="profile-btn" id="profile-btn">
            <img src="images/human.png" alt="Profile" id="user-avatar" />
          </div>
          <h1 id="welcome-user"
            style="color: rgb(133, 133, 18); font-weight: bold; font-size: 1.5rem; font-family:Georgia, 'Times New Roman', Times, serif; margin-top: 5px; text-align: center;">
            Hello User</h1>
        </div>
      </div>
      <div class="welcome">
        <div class="content">
          <h2 style="font-family:Georgia, 'Times New Roman', Times, serif; color: aliceblue; margin-top: 5px;">
            Chase Your Goals</h2>
          <p style="margin-top: 5px; color: aliceblue; opacity: 0.9;">Today you have <span id="total-tasks">26</span>
            tasks</p>
        </div>
      </div>
      
      <div class="categories-wrapper">
        <div class="categories-header">
          <h1 class="heading">Categories</h1>
          <div class="add-category-btn" id="add-category-btn">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="w-6 h-6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
            </svg>
          </div>
        </div>
        <div class="categories">
          <div class="category">
            <div class="left">
              <img src="images/human.png";  alt="personal" />
              <div class="content">
                <h1>Create Your Category</h1>
                
          </div>
            </div>
            
            <div class="options">
              <div class="toggle-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                  stroke="currentColor" class="w-6 h-6">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 6.75a.75.75 0 110-1.5.75.75 0 010 1.5zM12 12.75a.75.75 0 110-1.5.75.75 0 010 1.5zM12 18.75a.75.75 0 110-1.5.75.75 0 010 1.5z" />
                </svg>
              </div>
            </div>
          </div>
        </div>
        <!-- voice assistant button added below categories -->
        <div class="voice-assistant-wrapper">
          <button onclick="startListening()" ; id="voice-assistant-btn">        
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="mic-button" id="micBtn">
              <i class="fas fa-microphone"></i>        
            </div>
        </button>    
        <p id="userText"; class="voice-text"></p>
        <p id="aiText" class="voice-text response"></p>
        </div>
      </div>
    </div>
    <div class="category-screen screen">
      <div class="head-wrapper">
        <div class="back-btn">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 15.75L3 12m0 0l3.75-3.75M3 12h18" />
          </svg>
        </div>
        <div class="options">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 6.75a.75.75 0 110-1.5.75.75 0 010 1.5zM12 12.75a.75.75 0 110-1.5.75.75 0 010 1.5zM12 18.75a.75.75 0 110-1.5.75.75 0 010 1.5z" />
          </svg>
          <div class="options-menu" id="category-options-menu">
            <button id="add-task-category-opt">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
              </svg>
              Add
            </button>
            <button id="delete-category-opt" class="delete-cat">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
              </svg>
              Delete
            </button>
          </div>
        </div>
      </div>
      <div class="category-details">
        <img src="images/human.png"  alt="" id="category-img" />
        <div class="details">
          <p id="num-tasks">8 tasks</p>
          <h1 id="category-title">Personal</h1>
        </div>
      </div>
      <div class="tasks-wrapper">
        <div class="tasks">
          <div class="task-wrapper">
            <label for="task" class="task">
              <input type="checkbox" name="task" id="task" />
              <span class="checkmark"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                  stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
                </svg>
              </span>
              <p>Buy a new car lorem</p>
            </label>
            <div class="delete">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
              </svg>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="add-task-btn">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
        class="w-6 h-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
      </svg>
    </div>
    <div class="black-backdrop"></div>

    <!-- Settings Modal -->
    <div class="settings-modal" id="settings-modal">
      <h1 class="heading">Settings</h1>
      <div class="profile-info">
        <img src="images/human.png" alt="Profile" id="settings-avatar">
        <div class="details">
          <h2 id="settings-name">John Doe</h2>
          <p id="settings-email">john@example.com</p>
        </div>
      </div>
      <div class="input-group">
        <label for="notify-email">Notification Email</label>
        <input type="email" id="notify-email" placeholder="Where to send alerts?">
      </div>
      <div class="toggle-group">
        <span>Enable Email Alerts</span>
        <label class="switch">
          <input type="checkbox" id="email-toggle">
          <span class="slider"></span>
        </label>
      </div>
      <div class="btns">
        <button class="logout-btn" onclick="logout()">Logout</button>
        <button class="test-email-btn" onclick="sendTestEmail()">Test Email</button>
        <button class="save-settings-btn" onclick="saveSettings()">Save</button>
      </div>
    </div>

    <div class="add-task">
      <div class="add-task-backdrop"></div>
      <h1 class="heading">Add Task</h1>
      <div class="input-group">
        <label for="task-input"> Task </label>
        <input type="text" id="task-input" required />
      </div>
      <div class="input-group">
        <label for="category-select"> Category </label>
        <select id="category-select"></select>
      </div>
      <div class="input-group-row">
        <div class="input-group">
          <label for="date-input"> Date </label>
          <input type="date" id="date-input" />
        </div>
        <div class="input-group">
          <label for="time-input"> Time </label>
          <input type="time" id="time-input" />
        </div>
      </div>

      <div class="btns">
        <button class="cancel-btn">Cancel</button>
        <div class="toggle-group" style="padding: 0; background: transparent;">
          <span style="font-size: 1rem; font-weight: 500;">Email Notification</span>
          <label class="switch" style="transform: scale(0.8);">
            <input type="checkbox" id="task-email-notify">
            <span class="slider"></span>
          </label>
        </div>
        <button class="add-btn">Add Task</button>
      </div>
    </div>

    <!-- Add Category Modal -->
    <div class="add-category-modal" id="add-category-modal">
      <div class="add-task-backdrop"></div>
      <h1 class="heading">Add Category</h1>
      <div class="input-group">
        <label for="category-title-input"> Category Title </label>
        <input type="text" id="category-title-input" required />
      </div>
      <div class="input-group">
        <label for="category-icon-select"> Select Icon </label>
        <select id="category-icon-select">
          <option value="human.png">Personal (Human)</option>
          <option value="briefcase.png">Work (Briefcase)</option>
          <option value="shopping.png">Shopping (Cart)</option>
          <option value="web-design.png">Coding (Web)</option>
          <option value="healthcare.png">Health (Heart)</option>
          <option value="dumbbell.png">Fitness (Dumbbell)</option>
          <option value="education.png">Education (Book)</option>
          <option value="saving.png">Finance (Money)</option>
        </select>
      </div>

      <div class="btns">
        <button class="cancel-cat-btn" id="cancel-cat-btn">Cancel</button>
        <button class="save-cat-btn" id="save-cat-btn">Save</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
